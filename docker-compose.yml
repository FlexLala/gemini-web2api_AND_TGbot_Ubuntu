version: "3.8"

services:
  gemini-api:
    image: python:3.11-slim
    container_name: gemini-web2api
    working_dir: /app
    volumes:
      - ./gemini-web2api:/app
      - ./config.json:/app/config.json:ro
    command: >
      sh -c "pip install -q --no-cache-dir httpx &&
             python gemini_web2api.py --config config.json"
    networks:
      - gemini-bot-net
    restart: unless-stopped

  telegram-bot:
    build: ./telegram-bot
    container_name: gemini-telegram-bot
    env_file: .env
    volumes:
      - ./data:/app/data
    networks:
      - gemini-bot-net
    restart: unless-stopped
    depends_on:
      - gemini-api

networks:
  gemini-bot-net:
    driver: bridge
